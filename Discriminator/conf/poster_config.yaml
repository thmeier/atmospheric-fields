# Historical configuration for the discriminator models used in the poster
# figure. This file is intentionally separate from config.yaml so future
# experiments can change without changing the documented poster provenance.

# Base directory for NetCDF inputs. Set DATA_DIR to the directory containing the
# files named below.
data_dir: ${oc.env:DATA_DIR,data}

# ERA5/reference file. ERA5 is the positive class.
real_nc_file: "${data_dir}/era5_1.5deg_2004-01-01_2023-12-31.nc"
test_real_nc_file: "${data_dir}/era5_1.5deg_2004-01-01_2023-12-31.nc"

# GraphCast-holdout discriminator training pool:
# Pangu + FuXi forecasts from 2020 are fake training data.
# GraphCast and numerical models are held out from this training run.
fake_nc_file:
  - "${data_dir}/pangu_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/fuxi_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"

# GraphCast-holdout evaluation file.
test_fake_nc_file: "${data_dir}/graphcast_6steps_surf_1.5deg_2018-01-01_2018-12-31.nc"

# Poster fields. All four channels were used together.
variables:
  - "2m_temperature"
  - "10m_u_component_of_wind"
  - "10m_v_component_of_wind"
  - "mean_sea_level_pressure"
selected_variable: "mean_sea_level_pressure"
level: null

# ERA5/reference training split and normalization split.
train_real_range:
  - ["2008-01-01", "2017-12-31"]
  - ["2020-01-01", "2020-12-31"]

# Forecast fake training split.
train_fake_range: ["2020-01-01", "2020-12-31"]

# ERA5/reference holdout split used for scoring and plotting.
test_real_ranges:
  - [null, "2007-12-31"]
  - ["2018-01-01", "2019-12-31"]
  - ["2021-01-01", null]

# Forecast holdout split used for GraphCast, Pangu, and IFS HRES curves.
test_fake_range: ["2018-01-01", "2019-12-31"]

# Forecast lead times included in the poster curves.
lead_times: [6, 12, 24, 48, 96, 192]

# Training hyperparameters used for the poster discriminator runs.
max_samples: 0
batch_size: 64
epochs: 10
learning_rate: 1e-4
model_name: "squeezenet"
num_workers: 4
precision: "16-mixed"

# Balanced training was used. The fake half was sampled uniformly from forecast,
# corrupted ERA5, and corrupted forecast categories.
augment: true
augment_prob: 0.5

# Fieldwise corruptions selected each field with probability 0.5, forcing at
# least one field to be corrupted.
field_corruption_prob: 0.5

# Training corruption pool. The poster probes hf_noise and wind_rotation were
# held out because they are not listed here.
corruption_types:
  - "blur"
  - "grf"
  - "pixel_replace"
  - "wind_patch_shuffle"
corruption_severity_max: 1.0
corruption_severity_power: 2.0
disturb_type: null
disturb_level: 0.0

# Local CSV logging was sufficient for the poster runs; W&B is optional.
logger: "csv"
project_name: "weather-discriminator"
output_dir: "results"

# Forecast/numerical files consumed by poster plotting.
comparison_files:
  "GraphCast": "${data_dir}/graphcast_6steps_surf_1.5deg_2018-01-01_2018-12-31.nc"
  "IFS HRES": "${data_dir}/ifs_hres_6steps_surf_1.5deg_2018-01-01_2018-12-31.nc"
  "ERA5 Forecast": "${data_dir}/era5_forecast_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"

# Extra provenance notes. These keys are informational; the training scripts
# ignore them.
poster:
  graphcast_holdout_model: "results/weather_discriminator_squeezenet_all_fields_lightning.pth"
  pangu_holdout_model: "results/weather_discriminator_squeezenet_all_fields_pangu_holdout_lightning.pth"
  graphcast_holdout_training_fake_files:
    - "${data_dir}/pangu_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"
    - "${data_dir}/fuxi_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"
  pangu_holdout_training_fake_files:
    - "${data_dir}/graphcast_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"
    - "${data_dir}/fuxi_6steps_surf_1.5deg_2020-01-01_2020-12-31.nc"
  held_out_forecast_models:
    - "GraphCast"
    - "Pangu-Weather"
  held_out_numerical_models:
    - "IFS HRES"
    - "ERA5 Forecast"
  training_corruptions:
    - "blur"
    - "grf"
    - "pixel_replace"
    - "wind_patch_shuffle"
  held_out_poster_corruptions:
    - "hf_noise"
    - "wind_rotation"
