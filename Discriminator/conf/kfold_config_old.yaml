# Base directory for all default NetCDF inputs. Defaults to ./data unless the
# DATA_DIR environment variable is set. Upper-air inputs live below
# `${data_dir}/nonsurf`.
data_dir: ${oc.env:DATA_DIR,data}

# ERA5/reference file used for training real samples.
real_nc_file: "${data_dir}/nonsurf/era5_1.5deg_2004-01-01_2023-12-31.nc"

# Forecast files used as fake samples during discriminator training. This can be
# a single string or a YAML list.
fake_nc_file:
  # TODO: Verify exact nonsurf forecast filenames; paths assume the surface
  # naming convention with `surf` replaced by `nonsurf`.
  - "${data_dir}/nonsurf/era5-forecast_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/era5-gt_1.5deg_2004-01-01_2023-12-31.nc"
  - "${data_dir}/nonsurf/fuxi_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/graphcast_6steps_1.5deg_2018-01-01_2018-12-31.nc"
  - "${data_dir}/nonsurf/graphcast_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/ifs-hres_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/keisler_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/neuralgcm_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/pangu_6steps_1.5deg_2018-01-01_2018-12-31.nc"
  - "${data_dir}/nonsurf/pangu_6steps_1.5deg_2020-01-01_2020-12-31.nc"
  - "${data_dir}/nonsurf/sphericalcnn_6steps_1.5deg_2020-01-01_2020-12-31.nc"

# Input channels. Set `variables: null` to train/evaluate with only
# `selected_variable`.
variables:
  - "temperature"
  - "u_component_of_wind"
  - "v_component_of_wind"
  # - "specific_humidity"
  # TODO: Add/remove nonsurf fields once the final NetCDF variable list is known
  # (for example `geopotential`, if present and intended).

# Field used by single-variable analysis scripts and output filenames.
selected_variable: "temperature"

# Optional pressure level selector for upper-air data. Uses 850 hPa fields.
level: 850

# Real/reference time ranges used for training and normalization statistics.
# Multiple disjoint intervals are allowed.
train_real_range:
  - ["2004-01-01", "2023-12-31"]

# Forecast initialization-time range used for fake training samples.
train_fake_range: ["2014-01-01", "2023-12-31"]

# Real/reference holdout ranges. These should not overlap train_real_range.
test_real_ranges:
  - ["2001-01-01", "2001-12-31"]
  - ["2001-01-01", "2001-12-31"]

# Forecast initialization-time holdout range. This should not overlap
# train_fake_range.
test_fake_range: ["2020-01-01", "2020-12-31"]

# Forecast lead times, in hours, to include from files with a
# prediction_timedelta dimension.
lead_times: [6, 12, 24, 48, 96, 192]

# Analysis subsample cap. `0` means use all available samples; plotting scripts
# may still impose their own small defaults for expensive visual grids.
max_samples: 0

# Samples per optimizer step or inference batch.
batch_size: 64

# Number of full training epochs.
epochs: 5

# AdamW learning rate.
learning_rate: 1e-4

# Backbone architecture. Supported values: "squeezenet", "resnet18".
model_name: "squeezenet"

# DataLoader worker processes.
num_workers: 4

# If true, fake samples include model forecasts, corrupted ERA5, and corrupted
# forecasts. If false, only model forecasts are labeled fake.
augment: true

# Probability of corrupting a sample in unbalanced/evaluation dataset mode.
# Balanced training uses the explicit fake category mixture instead.
augment_prob: 0.5

# Probability that each channel is selected when applying a fieldwise corruption.
# At least one channel is always corrupted.
field_corruption_prob: 0.5

# Training-time augmentation corruption pool. These names are consumed by
# scripts/train_discriminator.py.
corruption_types:
  - "gaussian_blur"
  - "hf_noise"
  - "grf"
  - "pixel_replace"

# Corruption families intentionally held out from training-time augmentation.
held_out_corruption_types:
  - "patch_replace"
  - "quantization"

# Maximum sampled corruption severity.
corruption_severity_max: 1.0

# Severity sampler exponent. Values > 1 bias samples toward weaker corruptions.
corruption_severity_power: 2.0

# Optional fixed corruption override for targeted disturbance training/evaluation.
# Leave null/0.0 for the random corruption policy.
disturb_type: null
disturb_level: 0.0

# Lightning precision setting. The trainer falls back to 32-bit on CPU.
precision: "16-mixed"

# Logging
#   csv: local CSV logs under output_dir/lightning_logs (default, no W&B needed)
#   wandb: log to Weights & Biases using project_name
#   none: disable Lightning experiment logging
logger: "csv"

# W&B project name when logger="wandb"; also used as the base name for k-fold
# project overrides.
project_name: "weather-discriminator"

# Destination for model weights, plots, local CSV logs, and cache files.
output_dir: "results"

# Named files used by comparison plots and k-fold training. Numerical models are
# intentionally excluded from the neural-model training pool in scripts/train_kfold.py.
comparison_files:
  # Neural forecast paths point at the 2020 holdout period; train_kfold.py uses
  # matching 2018 files for the fake training pool when they exist.
  # TODO: Verify exact nonsurf forecast filenames.
  "GraphCast": "${data_dir}/nonsurf/graphcast_6steps_nonsurf_1.5deg_2020-01-01_2020-12-31.nc"
  "Pangu-Weather": "${data_dir}/nonsurf/pangu_6steps_nonsurf_1.5deg_2020-01-01_2020-12-31.nc"
  "FuXi": "${data_dir}/nonsurf/fuxi_6steps_nonsurf_1.5deg_2020-01-01_2020-12-31.nc"
  "IFS HRES": "${data_dir}/nonsurf/ifs_hres_6steps_nonsurf_1.5deg_2020-01-01_2020-12-31.nc"
  "ERA5 Forecast": "${data_dir}/nonsurf/era5_forecast_6steps_nonsurf_1.5deg_2020-01-01_2020-12-31.nc"
